<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camilo & Luisa</title>

<style>
body{
  margin:0;
  font-family: Georgia, serif;
  background: linear-gradient(#0b1320,#10233b,#0d1d18);
  color:white;
  text-align:center;
}

.section{
  padding:80px 20px;
}

.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
}

.card{
  max-width:900px;
  margin:auto;
}

h1{
  font-size:40px;
  line-height:1.1;
}

.amp{
  color:#d4af37;
}

.subtitle{
  margin-top:15px;
}

.date{
  margin-top:10px;
  color:#d4af37;
}

.countdown{
  margin-top:20px;
  display:flex;
  justify-content:center;
  gap:12px;
  flex-wrap:wrap;
}

.time-box{
  background:rgba(0,0,0,0.28);
  border:1px solid rgba(255,255,255,0.12);
  padding:12px 14px;
  border-radius:16px;
  min-width:78px;
}

.time-box strong{
  display:block;
  color:#d4af37;
  font-size:1.35rem;
}

.time-box span{
  display:block;
  margin-top:4px;
  font-size:0.8rem;
  text-transform:uppercase;
}

.btn{
  display:inline-block;
  margin-top:25px;
  padding:14px 25px;
  background:#d4af37;
  color:black;
  border-radius:25px;
  text-decoration:none;
}

.gallery{
  display:flex;
  justify-content:center;
  gap:15px;
  flex-wrap:wrap;
}

.gallery img{
  width:250px;
  height:320px;
  object-fit:cover;
  border-radius:15px;
}

.box{
  margin-top:20px;
  padding:20px;
  border:1px solid rgba(255,255,255,0.2);
  border-radius:15px;
}
</style>
</head>

<body>

<div class="section hero">
  <div class="card">
    <h1>
      Camilo Eduardo Almario Moreno
      <span class="amp">&</span>
      Luisa Fernanda Moreno Parra
    </h1>

    <p class="subtitle">
      Con mucha alegría queremos compartir este momento tan especial con ustedes
    </p>

    <p class="date">
      17 de octubre de 2026 · Chía, Cundinamarca
    </p>

    <div id="countdown" class="countdown"></div>

    <a class="btn" href="https://wa.me/573001112233">
      Confirmar asistencia
    </a>
  </div>
</div>

<div class="section">
  <h2>Detalles</h2>
  <div class="box">
    📍 Hacienda Marroquín<br><br>
    ⏰ 4:00 pm<br><br>
    👗 Formal elegante
  </div>
</div>

<div class="section">
  <h2>Momentos</h2>
  <div class="gallery">
    <img src="assets/foto1.jpg">
    <img src="assets/foto2.png">
    <img src="assets/foto3.jpeg">
  </div>
</div>

<script>
const weddingDate = new Date("2026-10-17T16:00:00").getTime();

function updateCountdown() {
  const now = new Date().getTime();
  const diff = weddingDate - now;

  if (diff <= 0) {
    document.getElementById("countdown").innerHTML =
      '<div class="time-box"><strong>Hoy</strong><span>Es el gran día</span></div>';
    return;
  }

  const days = Math.floor(diff / (1000 * 60 * 60 * 24));
  const hours = Math.floor((diff / (1000 * 60 * 60)) % 24);
  const minutes = Math.floor((diff / (1000 * 60)) % 60);

  document.getElementById("countdown").innerHTML = `
    <div class="time-box"><strong>${days}</strong><span>Días</span></div>
    <div class="time-box"><strong>${hours}</strong><span>Horas</span></div>
    <div class="time-box"><strong>${minutes}</strong><span>Min</span></div>
  `;
}

updateCountdown();
setInterval(updateCountdown, 1000);
</script>

</body>
</html>
