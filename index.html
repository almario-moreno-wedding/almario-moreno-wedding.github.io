<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camilo & Luisa</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Playfair Display', serif;
  background:#f3efe9;
  color:#2c2c2c;
  text-align:center;
}

/* TOP INFO */
.top-info{
  position:absolute;
  top:55px;
  left:50%;
  transform:translateX(-50%);
  width:min(1200px, 92%);
  display:flex;
  justify-content:space-between;
  font-size:16px;
  color:#3f73b6;
  font-weight:600;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.card{
  max-width:1100px;
  margin:auto;
  padding-top:120px;
  background:transparent;
  box-shadow:none;
  border-radius:0;
}

/* MINI TITLE */
.mini-title{
  letter-spacing:3px;
  font-size:12px;
  margin-bottom:20px;
  color:#999;
  text-transform:uppercase;
}

/* MONTAÑA */
.mountain{
  width:420px;
  display:block;
  margin:20px auto -10px;
}

/* NOMBRES */
h1{
  font-family:'Great Vibes', cursive;
  font-size:120px;
  font-weight:400;
  line-height:0.95;
  margin:0;
}

.name-top{
  margin-bottom:10px;
}

.name-bottom{
  margin-top:10px;
}

/* AMPERSAND */
.amp{
  color:#000;
  font-size:1em;
  display:inline;
  margin:0;
}

/* TEXTO */
.subtitle{
  margin:18px auto 0;
  font-size:28px;
  line-height:1.1;
  max-width:560px;
}

/* BOTÓN */
.btn{
  display:inline-block;
  margin-top:26px;
  padding:14px 34px;
  background:#3f73b6;
  color:white;
  border-radius:0;
  text-decoration:none;
  font-weight:400;
  letter-spacing:0.5px;
  text-transform:uppercase;
}
</style>
</head>

<body>

<!-- FECHA Y LUGAR -->
<div class="top-info">
  <span>17 de octubre de 2026</span>
  <span>Chía, Cundinamarca</span>
</div>

<!-- PORTADA -->
<div class="hero">
  <div class="card">

    <p class="mini-title">Nuestra boda</p>

    <!-- MONTAÑA -->
    <img src="assets/montana.png" class="mountain">

    <h1>Camilo <span class="amp">&</span> Luisa</h1>

    <p class="subtitle">
      Entre todas las historias hermosas del mundo, la nuestra es nuestra favorita.<br><br>
      Con mucha alegría, queremos invitarte a celebrar el día en que uniremos nuestras vidas.
    </p>

    <a class="btn" href="https://wa.me/573001112233">
      Confirmar asistencia
    </a>

  </div>
</div>

</body>
</html>
