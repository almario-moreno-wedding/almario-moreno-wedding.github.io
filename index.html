<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Camilo & Luisa</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display&family=Great+Vibes&display=swap" rel="stylesheet">

<style>
body{
  margin:0;
  font-family:'Playfair Display', serif;
  background:#f3efe9;
  color:#2c2c2c;
  text-align:center;
}

/* TOP INFO */
.top-info{
  position:absolute;
  top:55px;
  left:50%;
  transform:translateX(-50%);
  width:min(1100px, 90%);
  display:flex;
  justify-content:space-between;
  font-size:15px;
  color:#5f7ea3;
  font-weight:500;
}

/* HERO */
.hero{
  min-height:100vh;
  display:flex;
  align-items:center;
  justify-content:center;
  position:relative;
}

.card{
  background:white;
  padding:80px 40px;
  border-radius:30px;
  box-shadow:0 10px 40px rgba(0,0,0,0.05);
  max-width:700px;
}

/* MINI TITLE */
.mini-title{
  letter-spacing:3px;
  font-size:12px;
  margin-bottom:20px;
  color:#999;
  text-transform:uppercase;
}

/* MONTAÑA */
.mountain{
  width:260px;
  display:block;
  margin:20px auto 10px;
}

/* NOMBRES */
h1{
  font-family:'Great Vibes', cursive;
  font-size:80px;
  font-weight:400;
  line-height:1.1;
  margin:0;
}

.name-top{
  margin-bottom:10px;
}

.name-bottom{
  margin-top:10px;
}

/* AMPERSAND */
.amp{
  color:#d4af37;
  font-size:90px;
  display:block;
  margin:5px 0;
}

/* TEXTO */
.subtitle{
  margin-top:30px;
  font-size:18px;
  line-height:1.6;
  max-width:600px;
  margin-left:auto;
  margin-right:auto;
}

/* BOTÓN */
.btn{
  display:inline-block;
  margin-top:30px;
  padding:14px 28px;
  background:#d4af37;
  color:black;
  border-radius:30px;
  text-decoration:none;
  font-weight:500;
}
</style>
</head>

<body>

<!-- FECHA Y LUGAR -->
<div class="top-info">
  <span>17 de octubre de 2026</span>
  <span>Chía, Cundinamarca</span>
</div>

<!-- PORTADA -->
<div class="hero">
  <div class="card">

    <p class="mini-title">Nuestra boda</p>

    <!-- MONTAÑA -->
    <img src="assets/montana.png" class="mountain">

    <h1 class="name-top">Camilo Eduardo</h1>
    <span class="amp">&</span>
    <h1 class="name-bottom">Luisa Fernanda</h1>

    <p class="subtitle">
      Entre todas las historias hermosas del mundo, la nuestra es nuestra favorita.<br><br>
      Con mucha alegría, queremos invitarte a celebrar el día en que uniremos nuestras vidas.
    </p>

    <a class="btn" href="https://wa.me/573001112233">
      Confirmar asistencia
    </a>

  </div>
</div>

</body>
</html>
